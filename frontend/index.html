<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Celulares - Tienda X</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Tienda de Celulares</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center"> 
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/">Inicio</a>
                    </li>
                    <li class="nav-item" id="nav-gestion"> 
                        <a class="nav-link" href="/gestion">Gestión</a>
                    </li>
            
                    <li class="nav-item ms-2" id="nav-login-item">
                        <button id="btn-login-trigger" class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="#loginModal">
                            Iniciar sesión
                        </button>
                        <button id="btn-logout" class="btn btn-outline-danger btn-sm d-none ms-2">
                            Cerrar sesión
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4 text-center">Nuestros Celulares</h1>

        <div class="d-flex justify-content-center mb-4">
            <div class="dropdown">
                <button class="btn btn-primary dropdown-toggle" type="button" id="filterDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                    Filtrar por Marca
                </button>
                <ul class="dropdown-menu" aria-labelledby="filterDropdown" id="brand-filter-options">
                    <li><a class="dropdown-item filter-btn" href="#" data-brand="all">Todos</a></li>
                    <li><a class="dropdown-item filter-btn" href="#" data-brand="Apple">Apple</a></li>
                </ul>
            </div>
        </div>

        <div id="celulares-list" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            </div>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="loginModalLabel">🔑 Autenticación de Administrador</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="login-form" autocomplete="off">
                        <div class="mb-3">
                            <label for="login-email" class="form-label">Correo Electrónico</label>
                            <input type="email" id="login-email" name="email" class="form-control" placeholder="" autocomplete="off" required value="">
                        </div>
                        <div class="mb-3">
                            <label for="login-password" class="form-label">Contraseña</label>
                            <input type="password" id="login-password" name="password" class="form-control" placeholder="" autocomplete="new-password" required value="">
                        </div>
                        <div class="mb-3 d-none" id="confirm-password-group">
                            <label for="login-confirm-password" class="form-label">Confirmar contraseña</label>
                            <input type="password" id="login-confirm-password" class="form-control" placeholder="">
                        </div>
                        <div class="d-grid gap-2 mt-4">
                           <button type="submit" class="btn btn-primary">Ingresar al Sistema</button>
                        </div>
                        <div class="text-center mt-3">
                            <button type="button" class="btn btn-link p-0" id="auth-toggle-btn">¿No tenés cuenta? Registrarse</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="js/main.js"></script>
</body>
</html>
